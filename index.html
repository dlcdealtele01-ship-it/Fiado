<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta y Fiados V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .laser-line {
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background-color: rgba(255, 0, 0, 0.7); box-shadow: 0 0 10px red;
            animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <div class="max-w-[1400px] mx-auto p-3 md:p-6">
        <!-- Header -->
        <header class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-blue-900 tracking-tight">🛒 Mi Tiendita</h1>
                <p class="text-slate-500 text-sm mt-1 font-medium">Control de cuentas por cobrar</p>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto">
                <button onclick="cambiarVista('caja')" id="tabCaja" class="flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold bg-white text-blue-700 shadow-sm transition-all">🛒 Punto de Venta</button>
                <button onclick="cambiarVista('catalogo')" id="tabCatalogo" class="flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">📦 Catálogo</button>
            </div>
            <div class="text-right bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 w-full md:w-auto">
                <span class="text-xs text-blue-600 font-bold uppercase tracking-wider block">Total por Cobrar</span>
                <span class="text-2xl font-black text-blue-800" id="granTotalCobrar">$0.00</span>
            </div>
        </header>

        <!-- VISTAS -->
        <div id="vistaCaja" class="flex flex-col xl:flex-row gap-6 animate-fade-in">
            <!-- (Panel Izquierdo - Nuevo Registro) -->
            <div class="w-full xl:w-1/3 flex-shrink-0">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 xl:sticky xl:top-6 space-y-5">
                    <h2 class="text-lg font-bold text-slate-800">📝 Nuevo Registro</h2>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Nombre del Cliente *</label>
                        <input type="text" id="clienteInput" class="w-full rounded-xl border-slate-200 border p-3 bg-slate-50" placeholder="Ej: María Pérez">
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                        <h3 class="text-sm font-bold text-blue-900 mb-3">Agregar Artículo</h3>
                        <div class="space-y-3">
                            <div class="relative">
                                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">Código de Barra</label>
                                <div class="flex gap-2">
                                    <input type="text" id="prodCodigo" class="flex-1 rounded-lg border-2 border-blue-200 p-2.5 text-sm bg-yellow-50 shadow-inner" placeholder="Escribe o escanea...">
                                    <button type="button" onclick="abrirCamara('caja')" class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700 transition">📷</button>
                                </div>
                                <div id="sugerenciasCodigo" class="absolute z-[60] w-full bg-white border border-slate-200 shadow-xl rounded-lg mt-1 hidden max-h-48 overflow-y-auto no-scrollbar"></div>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">Nombre *</label>
                                <input type="text" id="prodNombre" class="w-full rounded-lg border-slate-200 border p-2.5 text-sm bg-white" placeholder="Ej: Arroz 1kg">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">Cantidad</label>
                                    <input type="number" id="prodCant" value="1" min="1" class="w-full rounded-lg border-slate-200 border p-2.5 text-sm font-bold">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">Precio Unit. ($)</label>
                                    <input type="number" id="prodPrecio" step="0.01" class="w-full rounded-lg border-slate-200 border p-2.5 text-sm font-bold">
                                </div>
                            </div>
                            <button onclick="agregarAlCarrito()" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition shadow-md">➕ Añadir</button>
                        </div>
                    </div>
                    <div>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl max-h-[150px] overflow-y-auto no-scrollbar">
                            <table class="w-full text-sm"><tbody id="listaCarrito" class="divide-y divide-slate-200"></tbody></table>
                        </div>
                        <div class="bg-slate-800 text-white p-4 rounded-xl mt-3 flex justify-between items-center">
                            <span class="font-medium text-slate-300">Total:</span>
                            <span class="text-2xl font-black text-green-400">$<span id="totalVenta">0.00</span></span>
                        </div>
                    </div>
                    <button onclick="guardarFiado()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-4 rounded-xl transition shadow-lg text-lg">💾 Guardar Fiado</button>
                </div>
            </div>

            <!-- Panel Derecho: Historial -->
            <div class="w-full xl:w-2/3">
                <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">Historial</h2>
                <div class="flex gap-2 bg-white p-1.5 rounded-lg border shadow-sm"><button onclick="filtrar('Todos')" class="px-3 py-1.5 text-xs font-bold rounded-md bg-slate-800 text-white filter-btn" id="btnFilterTodos">Todos</button><button onclick="filtrar('Pendiente')" class="px-3 py-1.5 text-xs font-bold rounded-md text-slate-600 filter-btn" id="btnFilterPendientes">Pendientes</button></div></div>
                <div id="contenedorTarjetas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- VISTA CATÁLOGO -->
        <div id="vistaCatalogo" class="hidden flex-col xl:flex-row gap-6 animate-fade-in">
            <div class="w-full xl:w-1/3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-5">📦 Registrar Producto</h2>
                <form id="formCatalogo" class="space-y-4">
                    <input type="hidden" id="catIdAnterior">
                    <input type="text" id="catCodigo" class="w-full rounded-lg border p-2.5 text-sm" placeholder="Código de barras">
                    <input type="text" id="catNombre" required class="w-full rounded-lg border p-2.5 text-sm" placeholder="Nombre">
                    <input type="number" id="catPrecio" step="0.01" required class="w-full rounded-lg border p-2.5 text-sm" placeholder="Precio ($)">
                    <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">Guardar en Catálogo</button>
                </form>
            </div>
            <div class="w-full xl:w-2/3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <table class="w-full text-sm"><tbody id="tablaCatalogo"></tbody></table>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE SEGURIDAD (PASSWORD) -->
    <script>
        // Función maestra de borrado con contraseña
        function borrarRegistro(id) {
            const password = prompt("Ingrese la contraseña de seguridad para borrar:");
            if (password === "123321") {
                registros = registros.filter(r => r.id !== id);
                localStorage.setItem('fiados_v4', JSON.stringify(registros));
                renderizarTarjetas();
            } else if (password !== null) {
                alert("Contraseña incorrecta. Acceso denegado.");
            }
        }

        // --- EL RESTO DE LAS FUNCIONES SE MANTIENEN IGUAL (Lógica de carrito, catálogo, escáner) ---
        // (El resto del código JavaScript funciona igual, solo reemplaza la función de borrarRegistro)
        
        // ... (Aquí iría todo el código JS de la versión anterior para que no ocupe tanto espacio, 
        // pero asegúrate de mantener la lógica que ya tenías y solo actualizar la función de borrarRegistro)
    </script>
</body>
</html>
